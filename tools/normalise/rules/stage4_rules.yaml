# Patterns to strip from merchant names (case-insensitive, applied with re.sub)
strip_patterns:
  # PTY LTD variants (anywhere in string, not just at end)
  - pattern: "\\s+PTY\\.?\\s*LTD?\\.?"
    name: "PTY LTD"
  - pattern: "\\s+P/L(?=\\s|$)"
    name: "P/L"
  - pattern: "\\s+PTY\\.?(?=\\s|$)"
    name: "PTY alone"

# Internal account transfers (own CBA accounts by masked number)
internal_account_mappings:
  - pattern: "^Transfer (?:to|from) xx\\d{4}\\b.*$"
    canonical: "Internal Account Transfer"
  - pattern: "^from account xx\\d{4}$"
    canonical: "Internal Account Transfer"
  - pattern: "^to account xx\\d{4}$"
    canonical: "Internal Account Transfer"

# For transfers: extract the person/entity name
transfer_entity_extraction:
  # Fast Transfer From PERSON, to PayID Phone, MEMO
  - pattern: "^Fast Transfer From (.+?),\\s*to PayID.*$"
    group: 1
  # Fast Transfer From PERSON, MEMO, MEMO
  - pattern: "^Fast Transfer From (.+?),\\s*(.+)$"
    group: 1
  # From ENTITY - REFERENCE
  - pattern: "^From (.+?)\\s*-\\s*.*$"
    group: 1
  # From Account
  - pattern: "^From Account (.+)$"
    group: 1
  # Transfer To ENTITY CommBank App MEMO
  - pattern: "^Transfer To (.+?)\\s+CommBank App.*$"
    group: 1
  # Transfer To ENTITY, CommBank App MEMO
  - pattern: "^Transfer To (.+?),\\s*CommBank App.*$"
    group: 1
  # Transfer To ENTITY, PayID ... from CommBank App, MEMO
  - pattern: "^Transfer To (.+?),\\s*PayID.*$"
    group: 1
  # To ENTITY - MEMO
  - pattern: "^To (.+?)\\s*-\\s*.*$"
    group: 1
  # Transfer to PERSON - Receipt NNN To NUMBERS
  - pattern: "^Transfer to (.+?)\\s*-\\s*Receipt.*$"
    group: 1
  # Mortgage - Transfer to PERSON - Receipt
  - pattern: "^Mortgage.*Transfer to (.+?)\\s*-\\s*Receipt.*$"
    group: 1
  # Amex - Transfer to PERSON
  - pattern: "^Amex.*Transfer to (.+?)\\s*-\\s*Receipt.*$"
    group: 1
  # TRANSFER FROM ENTITY REF
  - pattern: "^TRANSFER FROM (.+?)\\s+/REF/.*$"
    group: 1
  # Transfer From PERSON MEMO
  - pattern: "^Transfer From (.+?)\\s+(.+)$"
    group: 1
  # Transfer from PERSON NetBank MEMO
  - pattern: "^Transfer from (.+?)\\s+NetBank.*$"
    group: 1
  # ANZ MOBILE BANKING PAYMENT NNN TO Person
  - pattern: "^ANZ MOBILE BANKING PAYMENT \\d+ TO (.+)$"
    group: 1
  # PERSON Name - Osko Payment to (outgoing, capture name before " - Osko")
  - pattern: "^(.+?)\\s*-\\s*Osko Payment to\\s.*$"
    group: 1
  # PERSON Name [MEMO] - Osko Payment - Receipt (incoming)
  # Person names are typically ALL CAPS or Title Case; memo follows
  - pattern: "^((?:[A-Z][A-Z ]+[A-Z])|(?:[A-Z][a-z]+(?: [A-Z][a-z]+)*))\\s+.+?\\s*-\\s*Osko Payment\\s*-\\s*Receipt.*$"
    group: 1
  # PERSON Name - Osko Payment - Receipt (incoming, no memo)
  - pattern: "^(.+?)\\s+-\\s*Osko Payment\\s*-\\s*Receipt.*$"
    group: 1

# For banking operations: extract the entity name
banking_entity_extraction:
  # Direct Credit NNNNNN ENTITY, REFERENCE
  - pattern: "^Direct Credit (?:Pension )?(?:XX)?\\d+ (.+?)(?:[\\s,]\\s*(?:\\d|[A-Z]{3,}|\\w+\\d).*)$"
    group: 1
  # Direct Debit NNNNNN ENTITY, REFERENCE
  - pattern: "^Direct Debit (?:XX)?\\d+ (.+?)(?:[\\s,]\\s*(?:\\d|[A-Z]{3,}).*)$"
    group: 1
  # Wdl ATM CBA ATM LOCATION
  - pattern: "^Wdl ATM CBA ATM (.+?)\\s+NSW.*$"
    group: 1
    prefix: "ATM"
  # CASH DEPOSIT, CBA ATM LOCATION
  - pattern: "^CASH DEPOSIT,\\s*CBA ATM (.+?)\\s+NSW.*$"
    group: 1
    prefix: "ATM Deposit"
